<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    { "@type":"Question","name":"Quanto custa um site?","acceptedAnswer":{"@type":"Answer","text":"Site institucional a partir de R$ 2.800, landing page a partir de R$ 1.900, sistemas web sob orçamento personalizado. Toda proposta é fechada após o briefing, sem letras miúdas."}},
    { "@type":"Question","name":"Vocês atendem minha cidade?","acceptedAnswer":{"@type":"Answer","text":"Atendemos presencialmente toda a região do Vale do Taquari e Vale do Rio Pardo (Lajeado, Estrela, Arroio do Meio, Encantado, Teutônia, Santa Cruz do Sul, Vera Cruz, Venâncio Aires, Rio Pardo e cidades vizinhas). Para outras regiões, atendemos 100% online."}},
    { "@type":"Question","name":"O site aparece no Google?","acceptedAnswer":{"@type":"Answer","text":"Sim. Todo projeto sai com SEO técnico configurado: meta tags, sitemap, robots, dados estruturados (Schema.org), Core Web Vitals otimizado e conteúdo pensado para palavras-chave locais."}},
    { "@type":"Question","name":"Em quanto tempo o site fica pronto?","acceptedAnswer":{"@type":"Answer","text":"Landing page: 7 a 10 dias úteis. Site institucional: 3 a 4 semanas. Sistema web sob medida: a partir de 6 semanas, após briefing aprovado e conteúdo recebido."}},
    { "@type":"Question","name":"Eu consigo editar o site depois?","acceptedAnswer":{"@type":"Answer","text":"Sim. Entregamos com painel administrativo simples para editar textos, fotos e novidades. Para ajustes técnicos, atendemos direto no WhatsApp, sem fila de suporte."}},
    { "@type":"Question","name":"Por que não usar Wix ou WordPress?","acceptedAnswer":{"@type":"Answer","text":"Construtores são ótimos para quem está começando, mas conforme você cresce eles ficam lentos, ranqueiam mal e são difíceis de personalizar. Um site codificado sob medida é mais rápido, mais seguro e ranqueia melhor."}}
  ]
}
</script>
